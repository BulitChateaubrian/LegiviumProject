<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legivium Digital — L'agence digitale des professionnels du droit</title>
  <meta name="description" content="Legivium Digital, l'agence 100% spécialisée dans la croissance digitale des avocats, notaires, huissiers et cabinets juridiques. Sites web, SEO, Google Ads, outils IA sur-mesure.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    :root {
      --bg: #FAF8F3;
      --bg-alt: #F2EFE7;
      --dark: #12243E;
      --dark-mid: #1A3154;
      --gold: #C4A05A;
      --gold-light: #E8D5A0;
      --gold-dark: #9A7830;
      --gold-bg: #FBF6EA;
      --text: #1C1C22;
      --text-mid: #5A5A68;
      --text-light: #9898A5;
      --white: #FFFFFF;
      --nav-h: 72px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    #root { min-height: 100vh; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

    /* Reveal */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1);
    }
    .reveal.vis { opacity: 1; transform: translateY(0); }
    .d1 { transition-delay: 0.1s; }
    .d2 { transition-delay: 0.2s; }
    .d3 { transition-delay: 0.3s; }
    .d4 { transition-delay: 0.4s; }
    .d5 { transition-delay: 0.5s; }
    .d6 { transition-delay: 0.6s; }

    /* Keyframes */
    @keyframes tickerScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    @keyframes scrollBounce { 0%,100% { opacity:0.4; transform:translateY(0); } 50% { opacity:0.8; transform:translateY(8px); } }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
    @keyframes typeIn { from { width:0; } to { width:100%; } }
    @keyframes fadeSlideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    /* Nav */
    .lnav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: var(--nav-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 56px;
      transition: background 0.45s ease, box-shadow 0.45s ease;
    }
    .lnav.hero { background: transparent; }
    .lnav.solid {
      background: rgba(250,248,243,0.96);
      box-shadow: 0 1px 0 rgba(0,0,0,0.07);
      backdrop-filter: blur(10px);
    }
    .lnav-links { display: flex; gap: 32px; align-items: center; }
    .lnav-link {
      font-size: 12px; font-weight: 500; letter-spacing: 0.07em;
      text-transform: uppercase; text-decoration: none; cursor: pointer;
      background: none; border: none; padding: 0; transition: color 0.2s;
    }
    .lnav.hero .lnav-link { color: rgba(255,255,255,0.65); }
    .lnav.hero .lnav-link:hover { color: var(--gold); }
    .lnav.solid .lnav-link { color: var(--text-mid); }
    .lnav.solid .lnav-link:hover { color: var(--gold); }
    .lnav-cta {
      font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 10px 24px; border: 1px solid;
      cursor: pointer; transition: all 0.25s; text-decoration: none;
      background: none;
    }
    .lnav.hero .lnav-cta { color: var(--gold); border-color: var(--gold); }
    .lnav.hero .lnav-cta:hover { background: var(--gold); color: var(--dark); }
    .lnav.solid .lnav-cta { background: var(--gold); color: var(--dark); border-color: var(--gold); }
    .lnav.solid .lnav-cta:hover { background: var(--gold-dark); border-color: var(--gold-dark); }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 12px;
      font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 14px 36px; cursor: pointer; border: none;
      transition: all 0.25s ease; text-decoration: none; border-radius: 1px;
    }
    .btn-gold { background: var(--gold); color: var(--dark); }
    .btn-gold:hover { background: var(--gold-dark); transform: translateY(-1px); box-shadow: 0 8px 28px rgba(196,160,90,0.3); }
    .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
    .btn-outline:hover { background: rgba(196,160,90,0.07); }
    .btn-outline-w { background: transparent; color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.25); }
    .btn-outline-w:hover { border-color: var(--gold); color: var(--gold); }
    .btn-dark { background: var(--dark); color: var(--white); }
    .btn-dark:hover { background: #1e1e28; transform: translateY(-1px); }
    .btn-white { background: var(--white); color: var(--dark); }
    .btn-white:hover { background: var(--gold-bg); }

    /* Section tag */
    .stag {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: 10.5px; font-weight: 600; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 18px;
    }
    .stag::before { content: ''; display: block; width: 28px; height: 1px; background: var(--gold); }

    /* Service cards */
    .scard {
      background: var(--white);
      padding: 36px 32px 40px;
      border: 1px solid rgba(0,0,0,0.06);
      transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
      cursor: pointer; position: relative; overflow: hidden;
    }
    .scard::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 100%; height: 2px; background: var(--gold);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.35s ease;
    }
    .scard:hover { transform: translateY(-5px); box-shadow: 0 24px 60px rgba(0,0,0,0.09); border-color: transparent; }
    .scard:hover::after { transform: scaleX(1); }
    .scard-icon {
      width: 42px; height: 42px; border: 1px solid var(--gold-light);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 22px; color: var(--gold);
    }

    /* Forms */
    .finput {
      width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px;
      padding: 13px 16px; border: 1px solid rgba(0,0,0,0.1);
      background: var(--white); color: var(--text);
      outline: none; transition: border-color 0.2s; border-radius: 1px;
    }
    .finput:focus { border-color: var(--gold); }
    .flabel { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-mid); margin-bottom: 7px; display: block; }
    select.finput { appearance: none; cursor: pointer; }

    /* Ticker */
    .ticker-wrap { overflow: hidden; background: var(--dark); padding: 13px 0; }
    .ticker-track { display: flex; animation: tickerScroll 22s linear infinite; width: max-content; }
    .ticker-item {
      display: flex; align-items: center; gap: 20px; padding: 0 28px;
      font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); white-space: nowrap; font-weight: 500;
    }
    .ticker-dot { width: 3px; height: 3px; background: var(--gold); border-radius: 50%; flex-shrink: 0; }

    /* Chat mockup */
    .chat-msg { animation: fadeSlideUp 0.5s ease both; }

    @media (max-width: 860px) {
      .lnav { padding: 0 24px; }
      .lnav-links .lnav-link { display: none; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="js/components.jsx"></script>
<script type="text/babel" src="js/home.jsx"></script>
<script type="text/babel" src="js/inner.jsx"></script>
<script type="text/babel" src="js/app.jsx"></script>
</body>
</html>
